<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Thanks — your sample is on the way | Wescove</title>
<style>
  :root{--accent:#0a7d57;--accent-dark:#075b3f;--soft:#f1f8f4;--ink:#10241c;--line:#e3ebe7}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--soft);line-height:1.55;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;max-width:480px;width:100%;text-align:center;padding:48px 36px;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 30px rgba(7,91,63,.08)}
  .tick{width:64px;height:64px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  .tick svg{width:32px;height:32px}
  h1{font-size:26px;margin:0 0 12px;color:var(--accent-dark)}
  p{font-size:16px;color:#3c5249;margin:0 0 24px}
  a.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;padding:13px 26px;border-radius:10px}
  a.btn:hover{background:var(--accent-dark)}
</style>
</head>
<body>
  <div class="card">
    <div class="tick">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a7d57" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>You're in. Sample on the way.</h1>
    <p>Check your inbox within one business day for a free sample of recent Florida filings matched to your industry. Reply to that email any time &mdash; it comes straight to me, Wes.</p>
    <a class="btn" href="/">Back to Wescove</a>
  </div>
</body>
</html>
