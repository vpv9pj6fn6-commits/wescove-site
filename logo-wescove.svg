<svg width="520" height="160" viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wescove logo">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#c8a34a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a7d57"/>
      <stop offset="100%" stop-color="#075b3f"/>
    </linearGradient>
  </defs>

  <!-- Cove emblem: setting sun over coastal waves -->
  <g transform="translate(20,28)">
    <circle cx="52" cy="48" r="44" fill="#f1f8f4"/>
    <!-- sun -->
    <circle cx="52" cy="44" r="17" fill="url(#sun)"/>
    <!-- cove waves -->
    <path d="M18 64 q12 -9 24 0 t24 0 t24 0" fill="none" stroke="url(#wave)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M22 76 q11 -8 22 0 t22 0 t18 0" fill="none" stroke="url(#wave)" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-2">
    <tspan fill="#0d1b2a">Wes</tspan><tspan fill="#0a7d57">cove</tspan>
  </text>
  <text x="130" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="0.5" fill="#5a6b7e">New-business leads, every morning</text>
</svg>
